name: "🧠 Model Training (Daily Post-Market)"

on:
  schedule:
    # Once daily at 11:00 UTC = 4:30 PM IST (after market close)
    # Monday through Friday only
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  train-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Sync Latest Data First
        run: python data_engine.py

      - name: Train All Models
        run: python train_models.py

      - name: Commit and Push Models
        run: |
          git config --global user.name "David Data Bot"
          git config --global user.email "bot@david-ml.com"
          
          git add data/*.csv
          git add saved_models/*.pkl 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🧠 Model retrain: $(date +'%Y-%m-%d') post-market"
            git pull --rebase origin main || true
            git push
          fi
