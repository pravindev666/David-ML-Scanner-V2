name: "📡 Market Data Sync (Every 15 Min)"

on:
  schedule:
    # Every 15 mins during Indian market hours
    # 3:15 UTC to 10:30 UTC = 8:45 AM to 4:00 PM IST
    # Monday through Friday only
    - cron: '*/15 3-10 * * 1-5'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Market Data
        run: python data_engine.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "David Data Bot"
          git config --global user.email "bot@david-ml.com"
          
          git add data/*.csv
          
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "📡 Data sync: $(date +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push
          fi
