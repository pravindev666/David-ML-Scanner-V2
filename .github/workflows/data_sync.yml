name: Market Data Sync & Model Training

on:
  schedule:
    # Every 15 mins during Indian market hours (3:15 UTC to 10:30 UTC = 8:45 AM to 4:00 PM IST)
    - cron: '*/15 3-10 * * 1-5'
    # Full model retrain once daily at 11:00 UTC (4:30 PM IST, after market close)
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Sync Market Data
        run: python data_engine.py

      - name: Determine if Model Retrain Needed
        id: check_retrain
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          # Retrain at 11:00 UTC (post-market) or on manual trigger
          if [ "$HOUR" = "11" ] && [ "$MINUTE" -lt "15" ]; then
            echo "retrain=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "retrain=true" >> $GITHUB_OUTPUT
          else
            echo "retrain=false" >> $GITHUB_OUTPUT
          fi

      - name: Train Models (Post-Market)
        if: steps.check_retrain.outputs.retrain == 'true'
        run: python train_models.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "David Data Bot"
          git config --global user.email "bot@david-ml.com"
          
          # Stage data + trained models
          git add data/*.csv
          git add saved_models/*.pkl 2>/dev/null || true
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync: Data + Models $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
